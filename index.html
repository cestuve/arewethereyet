<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lord, Are We There Yet? | Lesson 1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650;9..144,800&family=Inter:wght@500;650;750;850;900&display=swap');

    :root {
      --cream: #faf6ef;
      --paper: #fffdfa;
      --warm-cream: #f2eadc;
      --clay: #d97a5f;
      --clay-dark: #b95f49;
      --gold: #d7a74a;
      --blue: #6e9097;
      --deep-blue: #354f5c;
      --navy: #243746;
      --sage: #97a97c;
      --olive: #6f7f5c;
      --muted-teal: #6e9097;
      --charcoal: #263238;
      --soft-shadow: 0 28px 80px rgba(36, 55, 70, 0.16);
      --small-shadow: 0 16px 34px rgba(36, 55, 70, 0.13);
      --focus: #275efe;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: var(--cream);
      color: var(--navy);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.75) 0 8%, transparent 8.3%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.55) 0 7%, transparent 7.3%),
        linear-gradient(to bottom, #f8efe2 0%, #f4dfc2 54%, #d9b98e 54%, #caa77a 100%);
    }

    .scene {
      position: absolute;
      inset: 0;
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
      transition: opacity .55s ease, transform .55s ease;
    }

    .scene.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.025);
    }

    .skip-link {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: #fff;
      color: var(--navy);
      padding: 10px 14px;
      border-radius: 10px;
      transform: translateY(-140%);
      transition: transform .2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1040px, calc(100vw - 32px));
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(255, 253, 247, 0.92);
      border: 3px solid rgba(217, 164, 65, 0.45);
      border-radius: 999px;
      padding: 10px 18px;
      box-shadow: var(--small-shadow);
      backdrop-filter: blur(8px);
    }

    .hud-title {
      font-weight: 900;
      letter-spacing: .02em;
      color: var(--navy);
      white-space: nowrap;
    }

    .hud-status {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 14px;
      color: #496173;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f1e3ca;
      border: 1px solid rgba(46,74,93,.14);
    }

    .anchors {
      display: flex;
      gap: 5px;
      align-items: center;
      text-align: left;
    }

    .lesson-menu-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .menu-toggle {
      border: 0;
      cursor: pointer;
      background: #f1e3ca;
      color: var(--navy);
      font-weight: 900;
      border-radius: 999px;
      padding: 8px 13px;
      box-shadow: 0 4px 10px rgba(30,52,67,.10);
      transition: transform .18s ease, background .18s ease;
    }

    .menu-toggle:hover {
      transform: translateY(-1px);
      background: #fffdf7;
    }

    .lesson-menu {
      position: absolute;
      top: 45px;
      right: 0;
      width: 290px;
      background: rgba(255,253,247,.98);
      border: 3px solid rgba(217,164,65,.62);
      border-radius: 20px;
      box-shadow: var(--soft-shadow);
      padding: 10px;
      display: grid;
      gap: 8px;
      z-index: 100;
    }

    .lesson-menu.hidden {
      display: none;
    }

    .menu-item {
      width: 100%;
      border: 2px solid rgba(46,74,93,.12);
      border-radius: 14px;
      background: #fff7e9;
      color: var(--navy);
      padding: 11px 12px;
      text-align: left;
      cursor: pointer;
      font-weight: 900;
      line-height: 1.2;
      transition: transform .18s ease, border .18s ease, background .18s ease;
    }

    .menu-item:hover {
      transform: translateY(-1px);
      border-color: #d9a441;
      background: #fffdf7;
    }

    .menu-item span {
      display: block;
      margin-top: 3px;
      color: #55768c;
      font-size: 12px;
      font-weight: 800;
    }

    .menu-item[disabled] {
      cursor: not-allowed;
      opacity: .55;
      background: #f3eee4;
      transform: none;
    }


    .anchor-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #e7d6ba;
      color: rgba(30,52,67,.35);
      font-size: 13px;
      font-weight: 900;
      border: 2px solid rgba(30,52,67,.13);
    }

    .anchor-dot.unlocked {
      background: var(--gold);
      color: white;
      border-color: #b98520;
      animation: pop .5s ease;
    }

    @keyframes pop {
      0% { transform: scale(.7); }
      60% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .opening {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 92px 24px 32px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(255,247,233,.4), rgba(205,167,122,.3));
    }

    .entrance {
      position: relative;
      width: min(980px, 94vw);
      min-height: 590px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: var(--soft-shadow);
      border: 8px solid rgba(255,255,255,.72);
      background:
        linear-gradient(to bottom, #f6e6ce 0 55%, #cfae7e 55% 100%);
    }

    .entrance-wall {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 17%, rgba(255,255,255,.5) 0 9%, transparent 9.4%),
        radial-gradient(circle at 86% 12%, rgba(255,255,255,.36) 0 8%, transparent 8.4%),
        linear-gradient(to bottom, #faedd8 0%, #f4dfc2 56%, #c9a171 56%, #bd9362 100%);
    }

    .entrance-door {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(360px, 44%);
      height: 455px;
      border-radius: 180px 180px 0 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.14), transparent 22% 78%, rgba(0,0,0,.08)),
        linear-gradient(to bottom, #5e8195, #345569);
      border: 10px solid #25475b;
      border-bottom: none;
      box-shadow: inset 0 0 0 10px rgba(255,255,255,.08);
    }

    .entrance-door::before {
      content: "";
      position: absolute;
      inset: 38px 44px;
      border: 5px solid rgba(255,255,255,.18);
      border-radius: 120px 120px 12px 12px;
    }

    .door-knob {
      position: absolute;
      right: 58px;
      top: 245px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.45), 0 2px 8px rgba(0,0,0,.25);
    }

    .entry-sign {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      width: min(730px, 86%);
      background: rgba(255,253,247,.94);
      border: 6px solid #d7a651;
      border-radius: 30px;
      padding: 28px 28px 24px;
      box-shadow: var(--soft-shadow);
    }

    .mini-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f2e1c3;
      border: 1px solid rgba(46,74,93,.12);
      color: #6d5422;
      font-weight: 900;
      padding: 8px 15px;
      border-radius: 999px;
      margin-bottom: 12px;
      letter-spacing: .03em;
      text-transform: uppercase;
      font-size: 13px;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(40px, 6.4vw, 74px);
      line-height: .95;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 16px auto 0;
      color: #496173;
      font-size: clamp(18px, 2.2vw, 28px);
      line-height: 1.35;
      max-width: 680px;
      font-weight: 700;
    }


    .primary-btn,
    .secondary-btn,
    .choice-btn,
    .object-btn {
      border: none;
      cursor: pointer;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
      background: linear-gradient(to bottom, var(--clay), var(--clay-dark));
      color: white;
      font-weight: 900;
      border-radius: 999px;
      padding: 16px 28px;
      box-shadow: 0 12px 22px rgba(183, 91, 63, .28);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 16px 28px rgba(183, 91, 63, .34);
    }

    .secondary-btn {
      background: #eef5f4;
      color: var(--deep-blue);
      font-weight: 900;
      border-radius: 999px;
      padding: 13px 20px;
      border: 2px solid rgba(46,74,93,.12);
      transition: transform .18s ease, background .18s ease;
    }

    .secondary-btn:hover {
      transform: translateY(-2px);
      background: white;
    }

    .waiting-room {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding-top: 76px;
      background: linear-gradient(to bottom, #f4e3cb 0 56%, #c99f6b 56% 100%);
    }

    .baseboard {
      position: absolute;
      left: 0;
      right: 0;
      top: 56%;
      height: 18px;
      background: #9b7047;
      box-shadow: 0 4px 0 rgba(60,40,20,.08);
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 44%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.13) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.11) 1px, transparent 1px),
        linear-gradient(to bottom, #c99f6b, #b88b59);
      background-size: 80px 80px, 80px 80px, auto;
    }

    .clock {
      position: absolute;
      top: 116px;
      left: 7%;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #fffdf7;
      border: 8px solid #6d8796;
      box-shadow: var(--small-shadow);
    }

    .clock::before,
    .clock::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: left center;
      background: var(--navy);
      border-radius: 4px;
    }

    .clock::before {
      width: 35px;
      height: 5px;
      transform: translateY(-50%) rotate(-45deg);
    }

    .clock::after {
      width: 43px;
      height: 4px;
      transform: translateY(-50%) rotate(86deg);
      animation: tick 8s steps(8) infinite;
    }

    .clock-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--clay);
      transform: translate(-50%, -50%);
    }

    @keyframes tick {
      to { transform: translateY(-50%) rotate(446deg); }
    }

    .wall-sign {
      position: absolute;
      top: 116px;
      left: 50%;
      transform: translateX(-50%);
      width: min(530px, 44vw);
      background: rgba(255,253,247,.94);
      border: 5px solid #d7a651;
      border-radius: 22px;
      padding: 18px 20px;
      text-align: center;
      box-shadow: var(--small-shadow);
      color: #334f60;
      font-weight: 900;
      font-size: clamp(17px, 1.5vw, 22px);
      line-height: 1.25;
    }

    .wall-instruction {
      display: block;
      margin-top: 10px;
      font-size: clamp(13px, 1.1vw, 16px);
      line-height: 1.35;
      color: #9B7047;
      font-weight: 800;
    }

    .now-serving {
      position: absolute;
      top: 126px;
      right: 7%;
      width: 185px;
      background: #1e3443;
      color: #fff1c8;
      border: 7px solid #6d8796;
      border-radius: 18px;
      padding: 15px;
      box-shadow: var(--small-shadow);
      text-align: center;
      font-weight: 900;
    }

    .now-serving span {
      display: block;
      margin-top: 8px;
      font-size: 50px;
      line-height: 1;
      color: #ffd36a;
      font-family: "Courier New", monospace;
      text-shadow: 0 0 12px rgba(255,211,106,.5);
    }

    .door {
      position: absolute;
      right: 8%;
      bottom: 44%;
      width: 200px;
      height: 315px;
      border-radius: 100px 100px 0 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.14), transparent 25% 75%, rgba(0,0,0,.08)),
        linear-gradient(to bottom, #608299, #3f6074);
      border: 8px solid #29485a;
      border-bottom: none;
      box-shadow: var(--small-shadow);
    }

    .door::before {
      content: "Lesson 2";
      position: absolute;
      left: 50%;
      top: 58px;
      transform: translateX(-50%);
      background: #fffdf7;
      color: var(--deep-blue);
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 900;
      border: 2px solid rgba(46,74,93,.2);
      text-align: center;
      min-width: 110px;
      box-sizing: border-box;
    }

    .door::after {
      content: "";
      position: absolute;
      right: 35px;
      top: 178px;
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 2px 7px rgba(0,0,0,.25);
    }

    .door.locked {
      filter: grayscale(.2) brightness(.84);
    }

    .door.locked .door-note {
      opacity: 1;
    }

    .door-note {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      width: 140px;
      background: #fff7d8;
      color: #6b5321;
      border: 2px solid #d9a441;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      opacity: .9;
    }

    .chairs {
      position: absolute;
      left: 11%;
      bottom: 15%;
      display: flex;
      gap: 18px;
      align-items: flex-end;
    }

    .chair {
      position: relative;
      width: 116px;
      height: 132px;
      background: #6d9c9d;
      border: 6px solid #406d70;
      border-radius: 24px 24px 12px 12px;
      box-shadow: var(--small-shadow);
    }

    .chair::before {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      bottom: -42px;
      height: 54px;
      background: #5e8d8f;
      border: 6px solid #406d70;
      border-radius: 14px 14px 20px 20px;
    }

    .chair::after {
      content: "";
      position: absolute;
      left: 15px;
      right: 15px;
      bottom: -76px;
      height: 38px;
      border-left: 8px solid #40595f;
      border-right: 8px solid #40595f;
    }

    .chair:nth-child(2) {
      background: #d97757;
      border-color: #a9533b;
      transform: translateY(8px);
    }

    .chair:nth-child(2)::before {
      background: #cb694d;
      border-color: #a9533b;
    }

    .chair:nth-child(3) {
      background: #879c72;
      border-color: #5d714b;
      transform: translateY(-4px);
    }

    .chair:nth-child(3)::before {
      background: #7b9167;
      border-color: #5d714b;
    }

    .table {
      position: absolute;
      left: 38%;
      bottom: 11%;
      width: 245px;
      height: 92px;
      background: #9b7047;
      border-radius: 44px;
      box-shadow: var(--small-shadow);
      border: 6px solid #765233;
    }

    .table::after {
      content: "";
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: -70px;
      height: 70px;
      border-left: 14px solid #765233;
      border-right: 14px solid #765233;
    }

    .magazine {
      position: absolute;
      top: -78px;
      left: 22px;
      width: 92px;
      height: 138px;
      transform: rotate(-8deg);
      background: #fffdf7;
      border: 3px solid #d9a441;
      border-radius: 8px;
      box-shadow: 0 8px 16px rgba(30,52,67,.16);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .magazine.two {
      left: 132px;
      top: -70px;
      transform: rotate(7deg);
      border-color: #6d9c9d;
    }

    .magazine-masthead {
      padding: 7px 8px 4px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: #fffdf7;
      background: linear-gradient(to right, #c57c2f, #d9a441);
    }

    .magazine.two .magazine-masthead {
      background: linear-gradient(to right, #4f778f, #6d9c9d);
    }

    .magazine-issue {
      padding: 2px 8px 0;
      font-size: 7px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #7b6441;
    }

    .magazine.two .magazine-issue {
      color: #416274;
    }

    .magazine-photo {
      margin: 6px 8px 6px;
      height: 42px;
      border-radius: 6px;
      border: 2px solid rgba(30,52,67,.12);
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.55), transparent 24%),
        linear-gradient(135deg, #f0d8a1, #c48654);
    }

    .magazine.two .magazine-photo {
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.55), transparent 24%),
        linear-gradient(135deg, #cfe1ea, #6d9c9d);
    }

    .magazine-coverline {
      padding: 0 8px 5px;
      font-size: 7.4px;
      line-height: 1.2;
      font-weight: 900;
      color: #6b5321;
    }

    .magazine.two .magazine-coverline {
      color: #315466;
    }

    .magazine-coverline.small {
      font-size: 6.8px;
      font-weight: 700;
      opacity: .92;
      padding-bottom: 7px;
    }

    .plant {
      position: absolute;
      left: 5%;
      bottom: 19%;
      width: 104px;
      height: 170px;
    }

    .pot {
      position: absolute;
      bottom: 0;
      left: 16px;
      width: 72px;
      height: 64px;
      background: #d97757;
      border: 5px solid #a9533b;
      border-radius: 14px 14px 24px 24px;
      box-shadow: var(--small-shadow);
    }

    .stem {
      position: absolute;
      bottom: 56px;
      left: 51px;
      width: 8px;
      height: 82px;
      background: #63784f;
      border-radius: 8px;
      transform: rotate(-4deg);
    }

    .leaf {
      position: absolute;
      background: #879c72;
      border: 3px solid #63784f;
      width: 44px;
      height: 26px;
      border-radius: 60% 40% 60% 40%;
    }

    .leaf.l1 { left: 20px; bottom: 106px; transform: rotate(-26deg); }
    .leaf.l2 { left: 55px; bottom: 126px; transform: rotate(28deg); }
    .leaf.l3 { left: 29px; bottom: 145px; transform: rotate(12deg); width: 38px; }

    .ticket-machine {
      position: absolute;
      right: 28%;
      bottom: 24%;
      width: 118px;
      height: 250px;
      background: linear-gradient(to bottom, #fefcf6, #ece6d9);
      border: 7px solid #6d8796;
      border-radius: 20px 20px 16px 16px;
      box-shadow: var(--small-shadow);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .ticket-machine:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(30,52,67,.18);
      filter: brightness(1.02);
    }

    .ticket-machine:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 6px;
    }

    .ticket-machine:active {
      transform: translateY(2px);
    }

    .ticket-machine::before {
      content: "TAKE A\A NUMBER";
      position: absolute;
      top: 14px;
      left: 13px;
      right: 13px;
      white-space: pre;
      background: #1e3443;
      color: #ffd36a;
      border-radius: 10px;
      padding: 10px 4px 8px;
      text-align: center;
      font-size: 12px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: inset 0 -2px 0 rgba(255,255,255,.08);
    }

    .ticket-machine::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -74px;
      transform: translateX(-50%);
      width: 18px;
      height: 74px;
      background: linear-gradient(to bottom, #8a9aa6, #667988);
      border-left: 4px solid #596c7b;
      border-right: 4px solid #596c7b;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
    }

    .ticket-slot {
      position: absolute;
      top: 102px;
      left: 22px;
      right: 22px;
      height: 14px;
      border-radius: 999px;

      0% {

<body>
  <a class="skip-link" href="#mainContent">Skip to course content</a>

  </main>

  <div class="modal-backdrop hidden" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modalPanel">
      <button class="close-btn" id="closeModal" aria-label="Close dialog">×</button>
      <div id="modalContent"></div>
    </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <audio id="doorAudio" src="https://cestuve.github.io/arewethereyet/creakydoor.mp3" preload="auto"></audio>

  <audio id="toolboxAudio" src="https://cestuve.github.io/arewethereyet/toolbox.mp3" preload="auto"></audio>
  <audio id="boardingAudio" src="https://cestuve.github.io/arewethereyet/boarding.mp3" preload="auto"></audio>
  <audio id="celebrationAudio" src="https://cestuve.github.io/arewethereyet/celebration.mp3" preload="auto"></audio>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
    const state = {
      ticketTaken: false,
      waiterType: "",
      waiterTitle: "",
      waiterFeedback: "",
      waitingFor: "",
      honestFeeling: "",
      nextStep: "",
      anchorUnlocked: false,
      lesson2Sorted: {},
      lesson2Reflection: "",
      lesson2Release: "",
      lesson3Foundation: "",
      lesson3Material: "",
      lesson3Reflection: "",
      lesson3FaithfulStep: "",
      lesson4HopePath: "",
      lesson4CarryDecisions: {},
      lesson4HopeStatement: "",
      lesson4NextStep: ""
    };

    const app = document.querySelector(".app");
    const openingScene = document.getElementById("openingScene");
    const lessonScene = document.getElementById("lessonScene");
    const lesson2Scene = document.getElementById("lesson2Scene");
    const lesson3Scene = document.getElementById("lesson3Scene");
    const lesson4Scene = document.getElementById("lesson4Scene");
    const enterWaitingRoom = document.getElementById("enterWaitingRoom");
    const ticketButton = document.getElementById("ticketButton");
    const serviceBell = document.getElementById("serviceBell");
    const toolboxButton = document.getElementById("toolboxButton");
    const boardingPassButton = document.getElementById("boardingPassButton");
    const menuToggle = document.getElementById("menuToggle");
    const lessonMenu = document.getElementById("lessonMenu");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalContent = document.getElementById("modalContent");
    const closeModal = document.getElementById("closeModal");
    const toast = document.getElementById("toast");
    const srStatus = document.getElementById("srStatus");
    const doorAudio = document.getElementById("doorAudio");
    const chimeAudio = document.getElementById("chimeAudio");
    const dingAudio = document.getElementById("dingAudio");
    const ticketAudio = document.getElementById("ticketAudio");
    const toolboxAudio = document.getElementById("toolboxAudio");
    const boardingAudio = document.getElementById("boardingAudio");
    const celebrationAudio = document.getElementById("celebrationAudio");

    const waiterTypes = {
      refresher: {
        title: "The Refresher",
        short: "You check for updates like your breakthrough has a tracking number.",
        feedback: "The practice for you is to seek God before you seek certainty. Before checking, refreshing, re-reading, or re-analyzing, pause and pray: “Lord, help me look to You before I look for an update.”"
      },
      fixer: {
        title: "The Fixer",
        short: "You're ready to assist the Lord with a project plan He did not request.",
        feedback: "Your gift for action is good, but patience asks you to distinguish obedience from control. Ask: “Is this my next faithful step, or am I trying to force an outcome?”"
      },
      spiraler: {
        title: "The Spiraler",
        short: "Your anxiety can build a full worst-case scenario before lunch.",
        feedback: "Waiting gives your imagination a lot of open space, and sometimes your imagination uses that space irresponsibly. Your practice is to turn one spiral into one prayer."
      },
      comparer: {
        title: "The Comparer",
        short: "You're spiritually fine until someone else’s timeline gets suspiciously blessed.",
        feedback: "Comparison makes waiting heavier than it already is. Your practice is to bless someone else’s good news while remembering that God has not misplaced your story."
      },
      freezer: {
        title: "The Freezer",
        short: "You act like you don't care, but your heart has gone into airplane mode.",
        feedback: "Numbness can feel safer than hope, but God invites your honest heart, not your polished performance. Your practice is one honest sentence a day."
      },
      overspiritualizer: {
        title: "The Over-Spiritualizer",
        short: "You say, “God’s timing is perfect,” while internally whispering, “But do we have an ETA?”",
        feedback: "The truth is still true, but God is not asking you to pretend the wait does not hurt. Your practice is to pair faith with honesty: “Lord, I trust You, and this is hard.”"
      }
    };

    function announce(message) {
      srStatus.textContent = message;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function updateMenuAnchorStatus(count) {
      const earnedCount = Math.max(0, Math.min(4, Number(count) || 0));
      const menuAnchorCount = document.getElementById("menuAnchorCount");
      if (menuAnchorCount) menuAnchorCount.textContent = `${earnedCount}/4`;

      for (let i = 1; i <= 4; i += 1) {
        const item = document.getElementById(`menuAnchor${i}`);
        if (!item) continue;
        const isEarned = i <= earnedCount;
        item.classList.toggle("earned", isEarned);
        item.setAttribute("aria-label", `${item.textContent.trim()} anchor ${isEarned ? "earned" : "not yet earned"}`);
      }
    }

    updateMenuAnchorStatus(0);

    function showModal(html) {
      modalContent.innerHTML = html;
      modalBackdrop.classList.remove("hidden");
      const title = modalContent.querySelector("h2");
      if (title) title.id = "modalTitle";
      closeModal.focus();
    }

    function closeDialog() {
      modalBackdrop.classList.add("hidden");
      const fallbackFocus =
        (ticketButton && !ticketButton.hidden ? ticketButton : null) ||
        (serviceBell && !serviceBell.hidden ? serviceBell : null) ||
        (toolboxButton && !toolboxButton.hidden ? toolboxButton : null) ||
        (boardingPassButton && !boardingPassButton.hidden ? boardingPassButton : null) ||
        menuToggle ||
        enterWaitingRoom;

      if (fallbackFocus) fallbackFocus.focus();
    }

    closeModal.addEventListener("click", closeDialog);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeDialog();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modalBackdrop.classList.contains("hidden")) {
        closeDialog();
      }
    });

    function closeLessonMenu() {
      if (!lessonMenu || !menuToggle) return;
      lessonMenu.classList.add("hidden");
      menuToggle.setAttribute("aria-expanded", "false");
    }

    function openLessonMenu() {
      if (!lessonMenu || !menuToggle) return;
      lessonMenu.classList.remove("hidden");
      menuToggle.setAttribute("aria-expanded", "true");
    }

    if (menuToggle && lessonMenu) {
      menuToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = !lessonMenu.classList.contains("hidden");
        if (isOpen) {
          closeLessonMenu();
        } else {
          openLessonMenu();
        }
      });

      document.addEventListener("click", (event) => {
        if (!lessonMenu.contains(event.target) && event.target !== menuToggle) {
          closeLessonMenu();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeLessonMenu();
      });
    }

    window.jumpToLesson = function jumpToLesson(lessonNumber) {
      closeLessonMenu();
      closeDialog();

      openingScene.classList.add("hidden");
      lessonScene.classList.remove("scene-exiting", "scene-entering", "scene-entered");
      lesson2Scene.classList.remove("scene-exiting", "scene-entering", "scene-entered");
      lesson3Scene.classList.remove("scene-exiting", "scene-entering", "scene-entered");
      lesson4Scene.classList.remove("scene-exiting", "scene-entering", "scene-entered");
      lessonScene.classList.add("hidden");
      lesson2Scene.classList.add("hidden");
      lesson3Scene.classList.add("hidden");
      lesson4Scene.classList.add("hidden");

      if (lessonNumber === 1) {
        lessonScene.classList.remove("hidden");
        announce("Lesson 1 opened from the lesson menu.");
        showToast("Jumped to Lesson 1: The Waiting Room.");
        if (ticketButton) ticketButton.focus();
      }

      if (lessonNumber === 2) {
        lesson2Scene.classList.remove("hidden");
        announce("Lesson 2 opened from the lesson menu.");
        showToast("Jumped to Lesson 2: The Control Desk.");
        if (serviceBell) serviceBell.focus();
      }

      if (lessonNumber === 3) {
        lesson3Scene.classList.remove("hidden");
        announce("Lesson 3 opened from the lesson menu.");
        showToast("Jumped to Lesson 3: The Construction Zone.");
        if (toolboxButton) toolboxButton.focus();
      }

      if (lessonNumber === 4) {
        lesson4Scene.classList.remove("hidden");
        announce("Lesson 4 opened from the lesson menu.");
        showToast("Jumped to Lesson 4: The Departure Gate.");
        if (boardingPassButton) boardingPassButton.focus();
      }
    }

    enterWaitingRoom.addEventListener("click", () => {
      if (doorAudio) {
        try {
          doorAudio.currentTime = 1.5;
          doorAudio.play().catch(() => {});
        } catch (error) {
          // If the browser blocks playback for any reason, continue without interrupting the experience.

    function checkCurrentMatch() {
      const wordId = state.lesson3SelectedWord;
      const definitionId = state.lesson3SelectedDefinition;
      const status = document.getElementById("matchStatus");

      if (!wordId || !definitionId || !status) return;

      const selected = constructionMaterialChoices.find(choice => choice.id === wordId);

      if (wordId === definitionId) {
        state.lesson3Matches[wordId] = definitionId;
        state.lesson3Material = wordId;

        const wordButton = document.getElementById("word-" + wordId);
        const definitionButton = document.getElementById("definition-" + definitionId);

        if (wordButton) {
          wordButton.classList.remove("selected");
          wordButton.classList.add("matched");
          wordButton.disabled = true;
        }

        if (definitionButton) {
          definitionButton.classList.remove("selected");
          definitionButton.classList.add("matched");
          definitionButton.disabled = true;
        }

        status.innerHTML = `<p><strong>${selected.title} matched.</strong> ${selected.feedback}</p>`;

        state.lesson3SelectedWord = "";
        state.lesson3SelectedDefinition = "";

        const completed = Object.keys(state.lesson3Matches).length;
        if (completed === constructionMaterialChoices.length) {
          status.innerHTML += `<p><strong>All materials matched.</strong> Hidden work is still holy work, even when the project timeline remains emotionally inconvenient.</p>`;
          const continueRow = document.getElementById("materialContinueRow");
          if (continueRow) continueRow.style.display = "flex";
        }
      } else {
        status.innerHTML = `<p><strong>Not quite.</strong> Try matching <strong>${selected.title}</strong> with a different definition. Waiting seasons already have enough confusion; we do not need to add mislabeled construction supplies.</p>`;
        const definitionButton = document.getElementById("definition-" + definitionId);
        if (definitionButton) definitionButton.classList.remove("selected");
        state.lesson3SelectedDefinition = "";
      }
    }

      if (!selected) return;

      state.lesson4HopePath = choiceId;

      document.querySelectorAll(".hope-choice").forEach(button => {
        button.classList.remove("selected");
      });

      const selectedButton = document.getElementById("hope-" + choiceId);
      if (selectedButton) selectedButton.classList.add("selected");

      const feedback = document.getElementById("hopeFeedback");
      if (feedback) {
        feedback.className = "hope-feedback";
        feedback.innerHTML = `<p><strong>${selected.title}:</strong> ${selected.feedback}</p>`;
      }

      const continueRow = document.getElementById("hopeContinueRow");
      if (continueRow) continueRow.style.display = "flex";
    }


    const carryOnItems = [
      {
        id: "scripture",
        title: "Scripture",
        text: "Truth sturdy enough to travel with you",
        correct: "pack",
        correctFeedback: "Yes. Scripture belongs in the carry-on. It is lighter than anxiety and much more gate-approved.",
        incorrectFeedback: "Not this one. Scripture should come with you. You are going to want truth nearby when your feelings start requesting a weather delay."
      },
      {
        id: "comparison",
        title: "Comparison",
        text: "Someone else’s timeline, edited highlights, and suspiciously tidy testimony",
        correct: "leave",
        correctFeedback: "Correct. Leave comparison behind. It always exceeds the emotional baggage limit and never helps you locate your own gate.",
        incorrectFeedback: "Not this one. Comparison does not belong in the carry-on. It is noisy, unhelpful, and somehow still not checked by security."
      },
      {
        id: "worstCase",
        title: "Worst-Case Scenarios",
        text: "A fully developed disaster movie your brain screened at 2:00 a.m",
        correct: "leave",
        correctFeedback: "Correct. Leave this behind. This bag is somehow both imaginary and extremely heavy.",
        incorrectFeedback: "Not this one. Worst-case scenarios do not need a boarding group. They can stay right here at the gate."
      },
      {
        id: "honestPrayer",
        title: "Honest Prayer",
        text: "Real conversation with God, including the part where you admit this is hard",
        correct: "pack",
        correctFeedback: "Yes. Honest prayer belongs in the carry-on. God is not asking for polished travel language; He is inviting your actual heart.",
        incorrectFeedback: "Not this one. Honest prayer definitely comes with you. It turns waiting from silent spiraling into honest dependence."
      },
      {
        id: "nextStep",
        title: "The Next Faithful Step",
        text: "One act of obedience, even if the whole itinerary is still blurry",
        correct: "pack",
        correctFeedback: "Yes. Pack this. You may not know the whole itinerary, but you can usually see the next gate.",
        incorrectFeedback: "Not this one. The next faithful step belongs in the carry-on. You do not need the whole map to take the next step."
      },
      {
        id: "needToUnderstand",
        title: "The Need to Understand Everything",
        text: "The belief that clarity must arrive before obedience can begin",
        correct: "leave",
        correctFeedback: "Correct. Leave this behind. If complete understanding were required, most of us would still be standing at the gate with seventeen unlabeled bags.",
        incorrectFeedback: "Not this one. The need to understand everything does not belong in the carry-on. Obedience often boards before full explanation."
      }
    ];

    window.showCarryOnActivity = function showCarryOnActivity() {
      state.lesson4CarryDecisions = {};
      renderCarryOnActivity();
    }

    function renderCarryOnActivity() {
      const itemsHtml = carryOnItems.map(item => `
        <div class="carryon-item" id="carry-card-${item.id}">
          <strong>${item.title}</strong>
          <span>${item.text}</span>
          <div class="carryon-actions">
            <button class="carryon-action-btn" id="carry-pack-${item.id}" onclick="chooseCarryOn('${item.id}','pack')">Pack It</button>
            <button class="carryon-action-btn" id="carry-leave-${item.id}" onclick="chooseCarryOn('${item.id}','leave')">Leave It</button>
          </div>
          <div class="carryon-feedback" id="carry-feedback-${item.id}"></div>
        </div>
      `).join("");

      showModal(`
        <h2 class="center-title">Pack Your Carry-On</h2>
        <p>
          You cannot control the departure time, but you can choose what you carry while you wait.
          Decide what belongs in your hope carry-on and what needs to stay at the gate.
        </p>

        <div class="carryon-progress" id="carryOnProgress">0 of ${carryOnItems.length} packing decisions complete</div>

        <div class="carryon-grid">
          ${itemsHtml}
        </div>

        <div class="carryon-summary" id="carryOnSummary"></div>

        <div class="button-row center-buttons" id="carryOnContinueRow" style="display:none;">
          <button class="primary-btn" onclick="showBoardingAnnouncement()">Continue →</button>
        </div>
      `);
    }

    window.chooseCarryOn = function chooseCarryOn(itemId, choice) {
      const item = carryOnItems.find(entry => entry.id === itemId);
      if (!item) return;
      if (state.lesson4CarryDecisions[itemId]) return;

      state.lesson4CarryDecisions[itemId] = choice;

      const packBtn = document.getElementById("carry-pack-" + itemId);
      const leaveBtn = document.getElementById("carry-leave-" + itemId);
      const feedback = document.getElementById("carry-feedback-" + itemId);
      const card = document.getElementById("carry-card-" + itemId);

      const isCorrect = choice === item.correct;

      if (card) card.classList.add("answered");

      if (packBtn) {
        packBtn.disabled = true;
        if (choice === "pack") packBtn.classList.add(isCorrect ? "correct" : "incorrect");
      }

      if (leaveBtn) {
        leaveBtn.disabled = true;
        if (choice === "leave") leaveBtn.classList.add(isCorrect ? "correct" : "incorrect");
      }

      if (feedback) {
        feedback.classList.add("active");
        feedback.innerHTML = `<p>${isCorrect ? item.correctFeedback : item.incorrectFeedback}</p>`;
      }

      const completed = Object.keys(state.lesson4CarryDecisions).length;
      const progress = document.getElementById("carryOnProgress");
      if (progress) {
        progress.textContent = `${completed} of ${carryOnItems.length} packing decisions complete`;
      }

      if (completed === carryOnItems.length) {
        const summary = document.getElementById("carryOnSummary");
        if (summary) {
          summary.textContent = "Carry-on complete. Comparison has been denied boarding, and hope has a confirmed seat.";
        }
        const continueRow = document.getElementById("carryOnContinueRow");
        if (continueRow) continueRow.style.display = "flex";
      }
    }

    window.showBoardingAnnouncement = function showBoardingAnnouncement() {
      showModal(`
        <h2 class="center-title">Boarding Announcement</h2>
        <div class="teaching-card">
          <h3>Final boarding announcement</h3>
          <p>
            Hope is not certainty about the outcome. Hope is confidence in the God who holds the outcome.
            You may still have questions. You may still feel tired. But you are not leaving this waiting season empty-handed.
          </p>
          <p>
            Please keep your honesty, surrender, faithfulness, and hope with you at all times.
            Unattended anxiety may be removed by the Holy Spirit.
          </p>
        </div>
        <div class="button-row center-buttons">
          <button class="primary-btn" onclick="showLesson4Reflection()">Continue to Reflection →</button>
        </div>
      `);
    }

    window.showLesson4Reflection = function showLesson4Reflection() {
      showModal(`
        <h2 class="center-title">Your Departure Gate Reflection</h2>
        <p>
          Name the hope you are carrying, and then name the next faithful step you can take while you wait.
        </p>

        <div class="reflection-grid">
          <div class="field">
            <label for="lesson4HopeStatement">A hope I can anchor in God is...</label>
            <textarea id="lesson4HopeStatement" placeholder="Example: God is still good, God is still present, God is still working...">${escapeHtml(state.lesson4HopeStatement)}</textarea>
          </div>
          <div class="field">
            <label for="lesson4NextStep">One faithful next step I can take with hope is...</label>
            <textarea id="lesson4NextStep" placeholder="Example: pray honestly, prepare wisely, encourage someone, keep showing up...">${escapeHtml(state.lesson4NextStep)}</textarea>
          </div>
        </div>

        <div class="button-row align-buttons">
          <button class="primary-btn" onclick="saveLesson4Reflection()">Save Reflection + Unlock Hope Anchor →</button>
          <button class="secondary-btn" onclick="downloadReflection()">Download My Responses</button>
        </div>
      `);
    }

    window.saveLesson4Reflection = function saveLesson4Reflection() {
      state.lesson4HopeStatement = document.getElementById("lesson4HopeStatement").value.trim();
      state.lesson4NextStep = document.getElementById("lesson4NextStep").value.trim();

      if (!state.lesson4HopeStatement || !state.lesson4NextStep) {
        showToast("Add reflection responses before unlocking the Hope anchor.");
        return;
      }

      unlockHopeAnchor();
    }

    function unlockHopeAnchor() {
      if (chimeAudio) {
        try {
          chimeAudio.currentTime = 1;
          chimeAudio.play().catch(() => {});
        } catch (error) {
          // Continue silently if audio cannot play.
        }
      }

      const anchorDots = document.querySelectorAll(".anchor-dot");
      if (anchorDots[3]) anchorDots[3].classList.add("unlocked");
      document.getElementById("anchorCount").textContent = "4/4";
      updateMenuAnchorStatus(4);
      document.getElementById("patienceStatus").textContent = "Anchored in Hope";
      announce("Hope anchor unlocked. Anchors collected: four of four.");

      showModal(`
        <div class="anchor-unlock">
          <h2>Anchor Unlocked: Hope</h2>
          <div class="big-anchor" aria-hidden="true">⚓</div>
          <p>
            Hope is not the belief that waiting will suddenly become easy. It is the confidence that God is faithful while you wait.
          </p>
          <p>
            You can move forward with honest prayer, surrendered trust, steady faithfulness, and anchored hope.
          </p>
          <div class="scripture-card">
            <blockquote>
              “May the God of hope fill you with all joy and peace as you trust in him,
              so that you may overflow with hope by the power of the Holy Spirit.”
            </blockquote>
            <cite>Romans 15:13, NIV</cite>
          </div>
          <div class="button-row center-buttons">
            <button class="primary-btn" onclick="showCourseComplete()">Complete the Study →</button>
          </div>
        </div>
      `);
    }

    window.showCourseComplete = function showCourseComplete() {
      showModal(`
        <div class="completion-card">
          <h2>Study Complete</h2>
          <div class="completion-badge" aria-hidden="true">✓</div>
          <p>
            You made it through the Waiting Room, the Control Desk, the Construction Zone, and the Departure Gate.
            This does not mean waiting is suddenly easy, but it does mean you are not waiting empty-handed.
          </p>
          <div class="scripture-card">
            <blockquote>
              Honesty. Surrender. Faithfulness. Hope.
            </blockquote>
            <cite>Four anchors for the seasons when God’s timing is not moving at the speed of your preferred itinerary</cite>
          </div>
          <div class="button-row center-buttons">
            <button class="primary-btn" onclick="finishCourse()">Finish</button>
          </div>
        </div>
      `);
    }



    window.finishCourse = function finishCourse() {
      launchConfetti();
    }

    function launchConfetti() {
      if (celebrationAudio) {
        try {
          celebrationAudio.pause();
          celebrationAudio.currentTime = 0;
          celebrationAudio.play().catch(() => {});
        } catch (error) {}
      }

      const existing = document.querySelector(".confetti-layer");
      if (existing) existing.remove();

      const layer = document.createElement("div");
      layer.className = "confetti-layer";
      layer.setAttribute("aria-hidden", "true");
      document.body.appendChild(layer);

      const colors = ["#f6c9d4", "#f9dfb5", "#cfe9df", "#cfe6f7", "#e4d7f6", "#f7dced"];
      const shapes = ["", "circle", "ribbon"];
      const total = 360;

      for (let i = 0; i < total; i++) {
        const piece = document.createElement("span");
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        piece.className = "confetti-piece" + (shape ? " " + shape : "");
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.animationDelay = (Math.random() * 2.4) + "s";
        piece.style.setProperty("--fall-duration", (3.0 + Math.random() * 2.2) + "s");
        piece.style.setProperty("--drift-mid", ((Math.random() * 160) - 80) + "px");
        piece.style.setProperty("--drift-down", ((Math.random() * 260) - 130) + "px");
        piece.style.setProperty("--confetti-color", colors[i % colors.length]);
        layer.appendChild(piece);
      }

      window.setTimeout(() => {
        layer.remove();
      }, 8800);
    }

  </script>
</body>
</html>
